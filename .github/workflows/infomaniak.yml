name: Infomaniak

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}
      cancel-in-progress: false # Can cause difficulties to publish when lots of changes are done
    steps:
    - name: Récupération des données
      uses: actions/checkout@v6
      with:
        submodules: true  # Fetch Hugo themes (true OR recursive)
        fetch-depth: 1    # Fetch all history for .GitInfo and .Lastmod

    - name: Installation de Node
      uses: actions/setup-node@v6
      with:
        node-version: 'lts/*'
        cache: 'yarn'

    - name: Installation des dépendances JavaScript
      run: yarn install --frozen-lockfile

    - name: Installation de Hugo
      uses: noesya/actions-hugo@release
      with:
        hugo-version: '0.161.1'
        extended: true

    - name: Compilation du site
      run: yarn osuny build

    - name: Installation de la clé SSH
      uses: shimataro/ssh-key-action@v2
      with:
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        known_hosts: 'just-a-placeholder-so-we-dont-get-errors'

    - name: ajout des hôtes connus pour SSH
      run: ssh-keyscan -p ${{ secrets.SSH_PORT }} -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

    - name: Déploiement avec rsync
      run: rsync -avz --delete -e "ssh -p ${{ secrets.SSH_PORT }}" ./public/ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.SSH_WORKDIR }}/

    - name: Notification Slack en cas d'échecs
      uses: rtCamp/action-slack-notify@v2
      if: failure()
      env:
        SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
        SLACK_TITLE: 'Problem on repo ${{ github.event.repository.name }}'
        SLACK_COLOR: '#FF0000'
